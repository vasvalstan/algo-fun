services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - bot-data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  bot-data:
