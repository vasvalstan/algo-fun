# Hermes Agent config — non-secrets only.
# Secrets (OPENROUTER_API_KEY, TELEGRAM_BOT_TOKEN, etc.) live in
# /data/.hermes/.env, seeded from Railway env vars by /app/entrypoint.sh
# on first boot.
#
# Default model: Gemma 4 31B (paid) via OpenRouter.
# ~$0.13/M in, $0.38/M out.  At ~1K tokens per chat turn that's ~$0.0005
# per question, so $1 of credit is ~2K turns.
#
# Why not nousresearch/hermes-4-70b (the obvious "match the framework"
# choice)?  Verified against OpenRouter's /api/v1/models on 2026-04-21:
# none of the nousresearch/hermes-* models advertise the `tools`
# parameter, so OpenRouter returns 404 "No endpoints found that support
# tool use" the moment the agent sends MCP tools — which it always
# does.
#
# Why not the free tier (google/gemma-4-31b-it:free)?  Hit HTTP 429 on
# the first request — free tier is far too rate-limited for an
# interactive agent that may issue several tool calls per turn.
#
# Swap candidates if Gemma 4 latency/quality is insufficient
# (cheap → expensive):
#   google/gemini-2.0-flash-lite-001   ($0.07/$0.30 per 1M)
#   google/gemini-2.5-flash-lite       ($0.10/$0.40 per 1M)
#   openai/gpt-4o-mini                 ($0.15/$0.60 per 1M)
#   anthropic/claude-3.5-haiku         ($0.80/$4.00 per 1M, best tools)

model:
  provider: openrouter
  default: google/gemma-4-31b-it

terminal:
  backend: local
  cwd: "/app"
  timeout: 30

# Restrict the agent to MCP-only tooling for sub-project #1.
# Code-edit / shell access is intentionally disabled here — that's
# sub-project #3 territory and has its own threat model.
tools:
  disabled:
    - terminal_tool
    - file_tools
    - code_execution_tool
    - browser_tool
    - web_tools
    - delegate_tool

mcp_servers:
  algo-fun-trading:
    command: python
    args: ["-m", "fastmcp", "run", "/app/mcp_server.py"]
    env:
      ALGOFUN_BACKEND_URL: ${ALGOFUN_BACKEND_URL}
      TRADE_API_SECRET: ${TRADE_API_SECRET}

# Note on platforms (Telegram + api_server):
# Hermes configures both via env vars in /data/.hermes/.env, NOT here.
# The entrypoint script writes:
#   - TELEGRAM_BOT_TOKEN / TELEGRAM_ALLOWED_USERS  (enables Telegram)
#   - API_SERVER_ENABLED=true / API_SERVER_HOST / API_SERVER_PORT
# `hermes config check` lists every supported env var.

display:
  tool_progress: all
